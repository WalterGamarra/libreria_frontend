<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>La Librería — Acceso</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/login.css"/>
</head>
<body>

<div class="wrapper">

  <div class="panel-left">
    <div class="brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </div>
      <span class="brand-name">La Librería</span>
    </div>

    <div class="panel-tagline">
      <h1>Panel de administración</h1>
      <p>Gestioná el catálogo, autores, editoriales y más desde un solo lugar.</p>
    </div>

    <div class="panel-footer">Solo acceso para personal autorizado.</div>
  </div>

  <div class="panel-right">
    <p class="form-title">Iniciar sesión</p>

    <div class="error-box" id="error-box"></div>

    <div class="field">
      <label for="username">Usuario</label>
      <input type="text" id="username" placeholder="Ingresá tu usuario" autocomplete="username"/>
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Ingresá tu contraseña" autocomplete="current-password"/>
    </div>

    <button class="btn-login" id="btn-login">Ingresar</button>

    <p class="form-hint">El acceso queda registrado por razones de seguridad.</p>
  </div>

</div>

<script src="js/auth.js"></script>
<script src="js/login.js"></script>
</body>
</html>
